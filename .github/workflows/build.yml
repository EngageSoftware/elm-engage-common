name: Compile Elm Sources

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ELM_HOME: ${{ github.workspace }}/.elm

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Cache ELM_HOME
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "${{ env.ELM_HOME }}"
          key: elm-${{ hashFiles('elm.json', 'review/elm.json') }}
          restore-keys: |
            elm-

      - name: pnpm install
        run: pnpm install

      - name: Setup Elm
        uses: mpizenberg/elm-tooling-action@289c229bc9d81512230e8b827df4c78398e08113 # v1.7
        with:
          cache-key: elm-home-${{ hashFiles('elm-tooling.json', 'elm.json', 'review/elm.json') }}

      - name: elm-review
        run: pnpm run lint

      - name: elm make
        run: pnpm run build

      - name: elm-test-rs
        run: pnpm run test

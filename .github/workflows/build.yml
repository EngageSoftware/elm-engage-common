name: Compile Elm Sources

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Elm
        uses: justgook/setup-elm@d90f4bde706c9faeaf049083ab0c779f7391793f # 1.3.0

      - name: Run Elm Review
        run: elm-review

      - name: Build the project
        run: elm make

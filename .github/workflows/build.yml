name: Build, Lint, Test Elm Package

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: init
        uses: ./.github/actions/init

      - name: elm-review
        run: pnpm run lint
        shell: pwsh

      - name: elm make
        run: pnpm run build
        shell: pwsh

      - name: elm-test-rs
        run: pnpm run test
        shell: pwsh

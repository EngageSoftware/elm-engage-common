name: Publish Elm Package

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Elm Publish
        uses: dillonkearns/elm-publish-action@v2.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

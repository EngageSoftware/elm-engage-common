name: Initialize CI environment

on:
  workflow_call:

runs:
  using: composite
  steps:
    - name: Set ELM_HOME
      run: "'ELM_HOME=${{ github.workspace }}/.elm' >> $GITHUB_ENV"
      shell: pwsh

    - name: Setup pnpm
      uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ".node-version"
        cache: "pnpm"

    - name: Cache ELM_HOME
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: "${{ env.ELM_HOME }}"
        key: elm-${{ hashFiles('elm.json', 'review/elm.json') }}
        restore-keys: |
          elm-

    - name: pnpm install
      run: pnpm install
      shell: pwsh
      env:
        NO_ELM_TOOLING_INSTALL: 1

    - name: elm-tooling install
      run: pnpm exec elm-tooling install
      shell: pwsh
